  body {

    color: var(--ink-muted);
    line-height: 1.8;
    margin: 0 0 24px;
  }
  a.link {
    display: block;
    padding: 16px;
    margin-bottom: 12px;
    border: 1px solid var(--hairline);
    border-radius: 14px;
    background: #fff;
    color: var(--ink);
    text-decoration: none;
    font-size: 14px;
    letter-spacing: 0.05em;
  }
  a.back {
    display: inline-block;
