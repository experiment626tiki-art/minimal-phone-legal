<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ミニマリストフォン</title>
<style>
  :root {
    --bg: #F5F5F7;
    --ink: #1C1C1E;
    --ink-muted: #6B6A67;
    --hairline: #1C1C1E1A;
  }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--ink);
    font-family: -apple-system, "Hiragino Sans", "Helvetica Neue", Arial, sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
  }
  .container {
    max-width: 480px;
    padding: 40px 24px;
    text-align: center;
  }
  h1 {
    font-size: 24px;
    font-weight: 300;
    letter-spacing: 0.05em;
    margin: 0 0 32px;
  }
  a.link {
    display: block;
    padding: 16px;
    margin-bottom: 12px;
    border: 1px solid var(--hairline);
    border-radius: 14px;
    background: #fff;
    color: var(--ink);
    text-decoration: none;
    font-size: 14px;
    letter-spacing: 0.05em;
  }
</style>
</head>
<body>
  <div class="container">
    <h1>ミニマリストフォン</h1>
    <a class="link" href="privacy.html">プライバシーポリシー / Privacy Policy</a>
    <a class="link" href="terms.html">利用規約 / Terms of Use</a>
  </div>
</body>
</html>
